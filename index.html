<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام الطيبات الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(circle at 50% -30%,#2a1e0a 0%,#0a0704 55%,#000 100%);color:#fff;min-height:100vh;padding-bottom:140px}
    .container{max-width:520px;margin:0 auto;padding:0 18px}
    .top-row{display:flex;justify-content:space-between;align-items:center;padding-top:22px}
    .circle-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2a1e0a,#14100a);border:1px solid rgba(212,162,74,.5);display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-center{font-size:50px;line-height:1;filter:drop-shadow(0 4px 12px rgba(212,162,74,.5))}
    .header{text-align:center;margin-top:10px}
    .header h1{font-size:38px;font-weight:900;letter-spacing:1px;background:linear-gradient(110deg,#b8862a,#f9e7a1 50%,#b8862a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header .sub{color:#d9c088;font-size:14px;margin-top:6px}
    .welcome{margin-top:14px;color:#f7e28b;font-size:14px;text-align:center}
    .page{display:none}
    .page.active{display:block}
    .cards{margin-top:30px;display:flex;flex-direction:column;gap:18px}
    .card{padding:22px;display:flex;align-items:center;gap:14px;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:18px}
    .gold-text{background:linear-gradient(135deg,#f9e7a1,#d4a24a 40%,#b8862a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card-body{flex:1;text-align:right}
    .card-body h2{font-size:28px;font-weight:900}
    .card-body p{color:#d9c088;font-size:14px;margin-top:8px;line-height:1.6}
    .gold-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;font-weight:800;padding:12px 26px;border:none;border-radius:999px;cursor:pointer;font-size:16px;margin-top:14px}
    .icon-visual{width:100px;height:100px;border-radius:24px;background:linear-gradient(135deg,#f9e7a1,#b8862a);display:flex;align-items:center;justify-content:center;font-size:48px}
    .books-top{text-align:center;margin-top:20px;margin-bottom:10px}
    .book-grid{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-bottom:30px}
    .book-card{cursor:pointer}
    .book-cover{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center;background-color:#1a1208;border-radius:14px 14px 0 0;overflow:hidden}
    .book-card-body{background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-top:none;border-radius:0 0 22px 22px;padding:12px;text-align:center}
    .book-card-body .t{color:#f7e28b;font-size:15px;font-weight:800}
    .book-card-body .d{color:#a69466;font-size:12px;margin-top:4px}
    .open-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;padding:9px 18px;border-radius:999px;border:none;cursor:pointer;font-size:14px;font-weight:800;margin-top:10px;width:100%}
    .bottom-nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 18px 20px 18px;background:linear-gradient(to top,#000 70%,transparent)}
    .bottom-nav{max-width:560px;margin:0 auto;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:999px;display:flex;overflow:hidden;padding:6px 0}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border:none;background:transparent;cursor:pointer}
    .nav-btn .ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;font-size:22px}
    .nav-btn .lbl{font-size:12px;font-weight:700;color:#a69466}
    .nav-btn.active .ico{background:linear-gradient(135deg,#f9e7a1,#b8862a);color:#1a1208}
    .nav-btn.active .lbl{color:#f7e28b;font-weight:800}
    .pdf-viewer{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:9999;flex-direction:column}
    .pdf-viewer.active{display:flex}
    .pdf-topbar{background:rgba(26,18,8,.98);border-bottom:1.5px solid rgba(212,162,74,.35);display:flex;align-items:center;justify-content:space-between;padding:8px 12px}
    .tb-close{height:40px;width:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#b91c1c,#7f1d1d);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .pdf-title{color:#f7e28b;font-size:16px;font-weight:800;flex:1;text-align:center}
    .pdf-frame{flex:1;width:100%;border:none;background:#fff}
    .pdf-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#0a0704}
    .spinner{width:50px;height:50px;border:4px solid rgba(212,162,74,.2);border-top-color:#d4a24a;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-text{color:#f7e28b;margin-top:18px;font-size:15px;font-weight:700}
    .load-sub{color:#a69466;margin-top:6px;font-size:13px}
  </style>
</head>
<body>
  <div class="container">
    <div class="top-row">
      <div class="circle-btn">&#128100;</div>
      <div class="logo-center">&#127806;</div>
      <div class="circle-btn">&#128276;</div>
    </div>
    <div class="header">
      <h1>نظام الطيبات الذكي</h1>
      <div class="sub">بناء نظام ذكي</div>
      <div class="welcome">أهلا وسهلا</div>
    </div>

    <main id="page-home" class="page active">
      <div class="cards">
        <section class="card">
          <div class="card-body">
            <h2 class="gold-text">الفيديوهات</h2>
            <p>شاهد أحدث الفيديوهات في مكان واحد</p>
            <button class="gold-btn" onclick="goTo('videos')">مشاهدة</button>
          </div>
          <div class="icon-visual">&#127916;</div>
        </section>
        <section class="card">
          <div class="card-body">
            <h2 class="gold-text">الكتب</h2>
            <p>اقرأ أفضل الكتب ومقاطع PDF</p>
            <button class="gold-btn" onclick="goTo('books')">استعراض</button>
          </div>
          <div class="icon-visual">&#128218;</div>
        </section>
      </div>
    </main>

    <main id="page-videos" class="page">
      <div style="text-align:center;margin-top:40px">
        <p style="color:#d9c088;font-size:16px">قريباً إن شاء الله</p>
        <button class="gold-btn" onclick="goTo('home')">الرئيسية</button>
      </div>
    </main>

    <main id="page-books" class="page">
      <div class="books-top">
        <button class="gold-btn" onclick="goTo('home')">الرئيسية</button>
      </div>
      <div class="book-grid">
        <div class="book-card">
          <div class="book-cover" style="background-image:url('kapak1.jpg')"></div>
          <div class="book-card-body">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الأول - PDF</div>
            <button class="open-btn" onclick="openPDF('kitap1.pdf')">فتح الكتاب</button>
          </div>
        </div>
        <div class="book-card">
          <div class="book-cover" style="background-image:url('kapak2.jpg')"></div>
          <div class="book-card-body">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الثاني - PDF</div>
            <button class="open-btn" onclick="openPDF('kitap2.pdf')">فتح الكتاب</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="pdf-viewer" id="pdfViewer">
    <div class="pdf-topbar">
      <button class="tb-close" onclick="closePDF()">X</button>
      <div class="pdf-title">الكتاب</div>
    </div>
    <iframe id="pdfFrame" class="pdf-frame" style="display:none"></iframe>
    <div class="pdf-loading" id="pdfLoading">
      <div class="spinner"></div>
      <div class="load-text">جاري تحميل الكتاب...</div>
      <div class="load-sub">يرجى الانتظار</div>
    </div>
  </div>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="goTo('books')"><div class="ico">&#128218;</div><span class="lbl">الكتب</span></button>
      <button class="nav-btn" onclick="goTo('videos')"><div class="ico">&#127916;</div><span class="lbl">الفيديوهات</span></button>
      <button class="nav-btn active" onclick="goTo('home')"><div class="ico">&#127968;</div><span class="lbl">الرئيسية</span></button>
    </nav>
  </div>

  <script>
    function goTo(name) {
      var pages = document.querySelectorAll('.page');
      for (var i = 0; i < pages.length; i++) {
        pages[i].classList.remove('active');
      }
      var t = document.getElementById('page-' + name);
      if (t) t.classList.add('active');
      window.scrollTo(0, 0);
    }

    function openPDF(filename) {
      document.getElementById('pdfViewer').classList.add('active');
      document.body.style.overflow = 'hidden';

      var frame = document.getElementById('pdfFrame');
      var loading = document.getElementById('pdfLoading');

      frame.style.display = 'none';
      loading.style.display = 'flex';

      var base = window.location.href.replace('index.html', '');
      if (base.charAt(base.length - 1) !== '/') base += '/';
      var fullUrl = base + filename;

      var viewerUrl = 'https://docs.google.com/gview?url=' + encodeURIComponent(fullUrl) + '&embedded=true';

      frame.src = viewerUrl;

      frame.onload = function() {
        loading.style.display = 'none';
        frame.style.display = 'block';
      };

      setTimeout(function() {
        loading.style.display = 'none';
        frame.style.display = 'block';
      }, 5000);
    }

    function closePDF() {
      document.getElementById('pdfViewer').classList.remove('active');
      document.getElementById('pdfFrame').src = '';
      document.getElementById('pdfFrame').style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  </script>
</body>
</html>
