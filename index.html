<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الطيبات الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:#0a0704;min-height:100vh;color:#fff;padding-bottom:140px}
.container{max-width:520px;margin:0 auto;padding:0 18px}
.top-row{display:flex;justify-content:space-between;align-items:center;padding-top:22px}
.circle-btn{width:48px;height:48px;border-radius:50%;background:#14100a;border:1px solid rgba(212,162,74,0.4);display:flex;align-items:center;justify-content:center;color:#f7e28b;font-size:22px}
.header{text-align:center;margin-top:10px}
.header h1{font-size:36px;font-weight:900;color:#f9e7a1;letter-spacing:1px}
.header .sub{color:#d9c088;font-size:18px;margin-top:6px}
.welcome{margin-top:14px;color:#f7e28b;font-size:14px;text-align:center}
.page{display:none}.page.active{display:block}
.book-grid{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.book-card{display:block;text-decoration:none;cursor:pointer}
.book-cover{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center;background-color:#1a1208;border:2px solid #b8862a;border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.book-cover::before{content:'';position:absolute;top:12px;left:12px;right:12px;height:2px;background:linear-gradient(to right,transparent,#d4a24a,transparent)}
.book-cover::after{content:'';position:absolute;bottom:12px;left:12px;right:12px;height:2px;background:linear-gradient(to right,transparent,#d4a24a,transparent)}
.book-cover-inner{position:relative;z-index:2;text-align:center}
.book-cover-title{font-size:24px;font-weight:900;color:#f9e7a1;letter-spacing:2px}
.book-cover-sub{font-size:14px;color:#d9c088;margin-top:8px}
.book-card-body{background:#0f0a04;border:1.5px solid rgba(212,162,74,0.5);border-top:none;border-radius:0 0 22px 22px;padding:14px 10px 18px;text-align:center}
.book-card-body .t{color:#f7e28b;font-size:16px;font-weight:800}
.book-card-body .d{color:#a69466;font-size:12px;margin-top:4px}
.open-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:800;margin-top:12px;border:none;cursor:pointer}
.bottom-nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 18px 18px 18px;background:linear-gradient(to top,#000 70%,transparent)}
.bottom-nav{max-width:520px;margin:0 auto;background:#0f0a04;border:1px solid rgba(212,162,74,0.5);border-radius:999px;padding:10px;display:flex;justify-content:space-around}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;border:none;background:transparent;cursor:pointer;color:#a69466}
.nav-btn .ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#14100a;border:1px solid rgba(212,162,74,0.3);font-size:20px}
.nav-btn .lbl{font-size:12px;font-weight:600}
.nav-btn.active .ico{background:linear-gradient(135deg,#f9e7a1,#b8862a);color:#1a1208}
.nav-btn.active .lbl{color:#f7e28b;font-weight:800}
</style>
</head>
<body>
<div class="container">
  <div class="top-row"><div class="circle-btn">🔔</div><div class="circle-btn" style="background:linear-gradient(135deg,#f9e7a1,#b8862a);color:#1a1208;border:none">🌾</div><div class="circle-btn">👤</div></div>
  <div class="header"><h1>نظام الطيبات الذكي</h1><div class="sub">بناء نظام ذكي</div><div class="welcome">✦ أهلاً وسهلاً ✦</div></div>

  <main id="page-home" class="page active">
    <div style="text-align:center;margin-top:30px"><button class="open-btn" onclick="switchPage('books')" style="padding:14px 32px;font-size:16px">الكتب 📖</button><button class="open-btn" onclick="switchPage('videos')" style="padding:14px 32px;font-size:16px;margin-top:12px;background:transparent;border:2px solid #d4a24a;color:#f7e28b">الفيديوهات 🎬</button></div>
  </main>

  <main id="page-videos" class="page"><div style="text-align:center;margin-top:50px"><h2 style="font-size:28px;color:#f7e28b">الفيديوهات</h2><p style="color:#d9c088;margin-top:10px;font-size:16px">قريباً إن شاء الله</p><button class="open-btn" style="margin-top:20px" onclick="switchPage('home')">الرئيسية ←</button></div></main>

  <main id="page-books" class="page">
    <div style="text-align:center;margin-top:28px"><h2 style="font-size:32px;color:#f9e7a1;font-weight:900">الكتب</h2><p style="color:#d9c088;font-size:14px;margin-top:6px">انقر على الكتاب للفتح</p><button class="open-btn" style="margin-top:12px;background:transparent;border:1.5px solid #d4a24a;color:#f7e28b;padding:8px 16px;font-size:12px" onclick="switchPage('home')">← الرئيسية</button></div>
    <div class="book-grid">
      <a class="book-card" href="https://go.fliplink.me/view/74F73E31-6A9E-4E6C-AB7B-F4041E983FA3" target="_blank">
        <div class="book-cover" style="background-image:url('kabak1.jpg');background-size:cover;background-position:center top"></div>
        <div class="book-card-body"><div class="t">كتاب الطيبات</div><div class="d">الجزء الأول · صفحات ٣٠-٩٥</div><button class="open-btn">فتح الكتاب 📖</button></div>
      </a>
      <a class="book-card" href="https://go.fliplink.me/view/B25F42CE-30BC-4E22-AC70-24FC958CCB54" target="_blank">
        <div class="book-cover" style="background-image:url('kapak2.jpg');background-size:cover;background-position:center top;background-color:#1a1208"></div>
        <div class="book-card-body"><div class="t">كتاب الطيبات</div><div class="d">الجزء الثاني · صفحات ٣٠-٩٥</div><button class="open-btn">فتح الكتاب 📖</button></div>
      </a>
    </div>
  </main>
</div>

<div class="bottom-nav-wrap"><nav class="bottom-nav">
  <button class="nav-btn" onclick="switchPage('books',this)"><div class="ico">📖</div><span class="lbl">الكتب</span></button>
  <button class="nav-btn" onclick="switchPage('videos',this)"><div class="ico">🎬</div><span class="lbl">الفيديوهات</span></button>
  <button class="nav-btn active" onclick="switchPage('home',this)"><div class="ico">🏠</div><span class="lbl">الرئيسية</span></button>
</nav></div>

<script>function switchPage(n,b){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});var pg=document.getElementById('page-'+n);if(pg)pg.classList.add('active');document.querySelectorAll('.nav-btn').forEach(function(x){x.classList.remove('active')});if(b)b.classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}</script>
</body>
</html>
