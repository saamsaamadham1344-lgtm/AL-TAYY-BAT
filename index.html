<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة الكتب الإسلامية</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
border-bottom:2px solid #d4af37;
}

header h1{
color:#d4af37;
font-size:28px;
}

header p{
margin-top:10px;
color:#ccc;
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h2{
color:#d4af37;
margin-bottom:15px;
}

.books{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:20px;
max-width:700px;
margin:auto;
}

.book{
background:#1a1a1a;
padding:20px;
border-radius:15px;
border:1px solid #333;
text-align:center;
}

.book h3{
color:#d4af37;
margin-bottom:10px;
}

.book p{
color:#bbb;
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
border-top:1px solid #333;
color:#888;
}

@media(min-width:768px){
.books{
grid-template-columns:1fr 1fr;
}
}
</style>

</head>
<body>

<header>
<h1>📚 مكتبة الكتب الإسلامية</h1>
<p>تصفح الكتب واقرأها مباشرة من الموقع</p>
</header>

<section class="hero">
<h2>مرحباً بك</h2>
<p>اختر الكتاب الذي تريد قراءته</p>
</section>

<section class="books">

<div class="book">
<h3>الكتاب الأول</h3>
<p>قراءة الكتاب الأول بصيغة PDF</p>
<a href="kitap1.pdf" class="btn">فتح الكتاب</a>
</div>

<div class="book">
<h3>الكتاب الثاني</h3>
<p>قراءة الكتاب الثاني بصيغة PDF</p>
<a href="kitap2.pdf" class="btn">فتح الكتاب</a>
</div>

</section>

<footer>
جميع الحقوق محفوظة © 2026
</footer>

</body>
</html>
