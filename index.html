<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام الطيبات الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(circle at 50% -30%,#2a1e0a 0%,#0a0704 55%,#000 100%);color:#fff;min-height:100vh;overflow-x:hidden}
    .container{max-width:520px;margin:0 auto;padding:0 18px}
    
    /* ANA SAYFA TASARIMI */
    .top-row{display:flex;justify-content:space-between;align-items:center;padding-top:22px}
    .circle-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2a1e0a,#14100a);border:1px solid rgba(212,162,74,.5);display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-center{font-size:50px;line-height:1;filter:drop-shadow(0 4px 12px rgba(212,162,74,.5))}
    .header{text-align:center;margin-top:10px}
    .header h1{font-size:38px;font-weight:900;letter-spacing:1px;background:linear-gradient(110deg,#b8862a,#f9e7a1 50%,#b8862a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    
    .page{display:none}
    .page.active{display:block}
    .cards{margin-top:30px;display:flex;flex-direction:column;gap:18px}
    .card{padding:22px;display:flex;align-items:center;gap:14px;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:18px;cursor:pointer}
    .gold-text{background:linear-gradient(135deg,#f9e7a1,#d4a24a 40%,#b8862a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card-body{flex:1;text-align:right}
    .gold-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;font-weight:800;padding:12px 26px;border:none;border-radius:999px;cursor:pointer;font-size:16px;margin-top:14px}
    .icon-visual{width:100px;height:100px;border-radius:24px;background:linear-gradient(135deg,#f9e7a1,#b8862a);display:flex;align-items:center;justify-content:center;font-size:48px}

    /* TIKTOK MODU (VİDEO İZLEME) */
    #page-videos { 
      height: 100vh; 
      overflow-y: scroll; 
      scroll-snap-type: y mandatory; 
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 1000;
    }
    .video-container { 
      width: 100vw; 
      height: 100vh; 
      scroll-snap-align: start; 
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .video-back-btn {
      position: absolute; top: 20px; right: 20px; z-index: 1100;
      background: rgba(0,0,0,0.8); color: #fff; border: 2px solid #d4a24a;
      padding: 8px 16px; border-radius: 999px; font-weight: bold; cursor: pointer;
    }

    /* ALT MENÜ */
    .bottom-nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 18px 20px 18px;background:linear-gradient(to top,#000 70%,transparent)}
    .bottom-nav{max-width:560px;margin:0 auto;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:999px;display:flex;overflow:hidden;padding:6px 0}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border:none;background:transparent;cursor:pointer}
    .nav-btn .ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;font-size:22px;color:#a69466}
    .nav-btn.active .ico{background:linear-gradient(135deg,#f9e7a1,#b8862a);color:#1a1208}
    .nav-btn.active .lbl{color:#f7e28b}
  </style>
</head>
<body>

  <!-- ANA SAYFA -->
  <div class="container" id="main-content">
    <div class="top-row">
      <div class="circle-btn">&#128100;</div>
      <div class="logo-center">&#127806;</div>
      <div class="circle-btn">&#128276;</div>
    </div>
    <div class="header">
      <h1>نظام الطيبات الذكي</h1>
    </div>

    <main id="page-home" class="page active">
      <div class="cards">
        <section class="card" onclick="goTo('videos')">
          <div class="card-body">
            <h2 class="gold-text">الفيديوهات</h2>
            <p style="color:#d9c088">اسحب لمشاهدة المقاطع</p>
            <button class="gold-btn">ابدأ المشاهدة</button>
          </div>
          <div class="icon-visual">&#127916;</div>
        </section>
      </div>
    </main>
  </div>

  <!-- VİDEO İZLEME SAYFASI -->
  <main id="page-videos" class="page">
    <button class="video-back-btn" onclick="goTo('home')">X خروج</button>
    <div id="video-list"></div>
  </main>

  <!-- ALT MENÜ -->
  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="goTo('videos')"><div class="ico">&#127916;</div></button>
      <button class="nav-btn active" onclick="goTo('home')"><div class="ico">&#127968;</div></button>
    </nav>
  </div>

  <script>
    // ########################################################
    // LİNKLERİN EKLENME ŞEKLİ (Örnektir):
    // ########################################################
    const myLinks = [
      'https://www.facebook.com/share/v/18e8tekMkz/',
      'https://www.facebook.com/share/v/1EJfjJ8Cm9/',
      'https://www.facebook.com/share/v/1SsuPmyNXC/',
      'https://www.facebook.com/share/r/1BMCaUPGtm/',
      'https://www.facebook.com/share/v/1Dqwpw21An/',
      'https://www.facebook.com/share/v/18in82xiDV/',
      'https://www.facebook.com/share/v/1ABhX4kSuz/',
      'https://www.facebook.com/share/v/1Fi7Ru5bC3/'
    ];

    function goTo(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const target = document.getElementById('page-' + name);
      if(target) target.classList.add('active');
      
      if(name === 'videos') {
        loadTikTokMode();
        document.querySelector('.bottom-nav-wrap').style.display = 'none';
      } else {
        document.querySelector('.bottom-nav-wrap').style.display = 'block';
        document.getElementById('video-list').innerHTML = ''; // Hafıza için temizle
      }
    }

    function loadTikTokMode() {
      const list = document.getElementById('video-list');
      list.innerHTML = '';
      myLinks.forEach(link => {
        let embed = '';
        // Facebook Paylaşım Linkini Embed Formata Çevirme
        if(link.includes('facebook.com')) {
          embed = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(link)}&show_text=0&width=500`;
        } 
        // YouTube Shorts
        else if(link.includes('shorts/')) {
          embed = `https://www.youtube.com/embed/${link.split('shorts/')[1].split('?')[0]}`;
        }
        // TikTok
        else if(link.includes('tiktok.com')) {
          let id = link.split('/video/')[1]?.split('?')[0];
          if(id) embed = `https://www.tiktok.com/embed/v2/${id}`;
        }
        // Instagram
        else if(link.includes('instagram.com')) {
          let id = link.split('/reel/')[1]?.split('/')[0] || link.split('/reels/')[1]?.split('/')[0];
          if(id) embed = `https://www.instagram.com/reel/${id}/embed`;
        }

        if(embed) {
          const div = document.createElement('div');
          div.className = 'video-container';
          div.innerHTML = `<iframe src="${embed}" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
          list.appendChild(div);
        }
      });
    }
  </script>
</body>
</html>
