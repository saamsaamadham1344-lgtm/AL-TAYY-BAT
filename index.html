<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام الطيبات الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Cairo', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at 50% -10%, #2a1e0a, #0a0704 55%, #000); min-height: 100vh; color: #fff; padding-bottom: 140px; }
  .container { max-width: 520px; margin: 0 auto; padding: 0 18px; }
  .gold-text { background: linear-gradient(135deg, #f9e7a1, #d4a24a 40%, #b8862a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .gold-border-card { background: #0f0a04; border: 1px solid rgba(212,162,74,0.5); border-radius: 28px; }
  .gold-btn { background: linear-gradient(135deg, #f9e7a1, #d4a24a, #b8862a); color: #1a1208; font-weight: 800; padding: 12px 26px; border-radius: 999px; border: none; cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; }
  .top-row { display: flex; justify-content: space-between; align-items: center; padding-top: 22px; }
  .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #2a1e0a, #14100a); border: 1px solid rgba(212,162,74,0.4); display: flex; align-items: center; justify-content: center; color: #f7e28b; }
  .header { text-align: center; margin-top: 10px; }
  .header h1 { font-size: 38px; font-weight: 900; background: linear-gradient(110deg, #b8862a, #f9e7a1 50%, #b8862a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 200% 100%; animation: shine 4s linear infinite; }
  @keyframes shine { from{background-position:200% 0;} to{background-position:-200% 0;} }
  .header .sub { color: #d9c088; font-size: 18px; margin-top: 6px; }
  .welcome { margin-top: 14px; color: #f7e28b; font-size: 14px; text-align: center; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
  .cards { margin-top: 30px; display: flex; flex-direction: column; gap: 18px; }
  .card { padding: 22px; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
  .card-body { flex: 1; text-align: right; }
  .card-body h2 { font-size: 28px; font-weight: 900; }
  .card-body p { color: #d9c088; font-size: 14px; margin-top: 8px; line-height: 1.6; }
  .icon-visual { width: 100px; height: 100px; flex-shrink: 0; border-radius: 24px; background: linear-gradient(135deg, #f9e7a1, #b8862a); display: flex; align-items: center; justify-content: center; }
  .icon-visual-dark { background: linear-gradient(135deg, #1a1208, #0a0704); border: 2px solid #b8862a; }
  .section-title { text-align: center; margin-top: 28px; }
  .section-title h2 { font-size: 28px; font-weight: 900; }
  .section-title p { color: #d9c088; font-size: 14px; margin-top: 6px; }
  .book-grid { margin-top: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .book-card { text-decoration: none; cursor: pointer; display: block; }
  .book-card-inner { padding: 14px; text-align: center; transition: transform .2s; }
  .book-cover-img { height: 200px; border-radius: 14px; background: linear-gradient(135deg, #1a1208, #0a0704); border: 2px solid #b8862a; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .book-cover-img::before, .book-cover-img::after { content: ''; position: absolute; left: 10px; right: 10px; height: 2px; background: linear-gradient(to right, transparent, #d4a24a, transparent); }
  .book-cover-img::before { top: 12px; }
  .book-cover-img::after { bottom: 12px; }
  .book-title { font-size: 20px; font-weight: 900; color: #f9e7a1; letter-spacing: 2px; }
  .book-subtitle { font-size: 13px; color: #d9c088; margin-top: 8px; font-weight: 600; }
  .book-info { text-align: right; padding-top: 12px; }
  .book-info .t { color: #f7e28b; font-size: 15px; font-weight: 800; }
  .book-info .d { color: #a69466; font-size: 12px; margin-top: 4px; }
  .open-btn { background: transparent; border: 1.5px solid #d4a24a; color: #f7e28b; padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
  .bottom-nav-wrap { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 0 18px 18px 18px; background: linear-gradient(to top, #000 70%, transparent); }
  .bottom-nav { max-width: 520px; margin: 0 auto; background: #0f0a04; border: 1px solid rgba(212,162,74,0.5); border-radius: 999px; padding: 10px; display: flex; justify-content: space-around; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; border: none; background: transparent; cursor: pointer; color: #a69466; }
  .nav-btn .ico { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1208, #0a0704); border: 1px solid rgba(212,162,74,0.3); }
  .nav-btn .lbl { font-size: 12px; font-weight: 600; }
  .nav-btn.active .ico { background: linear-gradient(135deg, #f9e7a1, #b8862a); color: #1a1208; border-color: #b8862a; }
  .nav-btn.active .lbl { color: #f7e28b; font-weight: 800; }
</style>
</head>
<body>
<div class="container">
  <div class="top-row">
    <div class="circle-btn">🔔</div>
    <svg width="56" height="56" viewBox="0 0 64 64"><path d="M32 58 C32 42, 44 20, 58 14 C52 28, 38 48, 22 56 Z" fill="#d4a24a"/><path d="M32 58 C32 44, 22 22, 8 16 C14 30, 28 50, 42 58 Z" fill="#b8862a"/></svg>
    <div class="circle-btn">👤</div>
  </div>
  <div class="header">
    <h1>نظام الطيبات الذكي</h1>
    <div class="sub">بناء نظام ذكي</div>
    <div class="welcome">✦ أهلاً وسهلاً ✦</div>
  </div>

  <!-- HOME -->
  <main id="page-home" class="page active">
    <div class="cards">
      <section class="card gold-border-card">
        <div class="card-body">
          <h2 class="gold-text">الفيديوهات</h2>
          <p>شاهد أحدث الفيديوهات في مكان واحد</p>
          <button class="gold-btn" style="margin-top:14px;" onclick="switchPage('videos')">مشاهدة ▶</button>
        </div>
        <div class="icon-visual">
          <div style="width:70%;height:70%;border-radius:20px;background:linear-gradient(135deg,#1a1208,#0a0704);display:flex;align-items:center;justify-content:center;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="#f9e7a1"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </section>
      <section class="card gold-border-card">
        <div class="card-body">
          <h2 class="gold-text">الكتب</h2>
          <p>اقرأ أفضل الكتب وملفات PDF</p>
          <button class="gold-btn" style="margin-top:14px;" onclick="switchPage('books')">استعراض 📖</button>
        </div>
        <div class="icon-visual icon-visual-dark">
          <svg width="40" height="40" viewBox="0 0 64 64"><path d="M32 58 C32 42, 44 20, 58 14 C52 28, 38 48, 22 56 Z" fill="#d4a24a"/><path d="M32 58 C32 44, 22 22, 8 16 C14 30, 28 50, 42 58 Z" fill="#b8862a"/></svg>
        </div>
      </section>
    </div>
  </main>

  <!-- VIDEOS -->
  <main id="page-videos" class="page">
    <div class="section-title"><h2 class="gold-text">الفيديوهات</h2><p>قريباً</p></div>
  </main>

  <!-- BOOKS -->
  <main id="page-books" class="page">
    <div class="section-title">
      <h2 class="gold-text">الكتب</h2>
      <p>انقر على الكتاب للفتح</p>
    </div>
    <div class="book-grid">
      <a class="book-card" href="kitab-altayyibat-1.pdf" target="_blank">
        <div class="gold-border-card book-card-inner">
          <div class="book-cover-img">
            <svg width="44" height="44" viewBox="0 0 64 64"><path d="M32 58 C32 42, 44 20, 58 14 C52 28, 38 48, 22 56 Z" fill="#d4a24a"/><path d="M32 58 C32 44, 22 22, 8 16 C14 30, 28 50, 42 58 Z" fill="#b8862a"/></svg>
            <div class="book-title" style="margin-top:10px;">الطيبات</div>
            <div class="book-subtitle">الجزء الأول</div>
          </div>
          <div class="book-info">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الأول · PDF</div>
            <button class="open-btn">📖 فتح الكتاب</button>
          </div>
        </div>
      </a>
      <a class="book-card" href="kitap-altayyibat-1.pdf" target="_blank">
        <div class="gold-border-card book-card-inner">
          <div class="book-cover-img">
            <svg width="44" height="44" viewBox="0 0 64 64"><path d="M32 58 C32 42, 44 20, 58 14 C52 28, 38 48, 22 56 Z" fill="#d4a24a"/><path d="M32 58 C32 44, 22 22, 8 16 C14 30, 28 50, 42 58 Z" fill="#b8862a"/></svg>
            <div class="book-title" style="margin-top:10px;">الطيبات</div>
            <div class="book-subtitle">الجزء الثاني</div>
          </div>
          <div class="book-info">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الثاني · PDF</div>
            <button class="open-btn">📖 فتح الكتاب</button>
          </div>
        </div>
      </a>
    </div>
  </main>
</div>

<div class="bottom-nav-wrap">
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="switchPage('books', this)">
      <div class="ico">📖</div><span class="lbl">الكتب</span>
    </button>
    <button class="nav-btn" onclick="switchPage('videos', this)">
      <div class="ico">🎬</div><span class="lbl">الفيديوهات</span>
    </button>
    <button class="nav-btn active" onclick="switchPage('home', this)">
      <div class="ico">🏠</div><span class="lbl">الرئيسية</span>
    </button>
  </nav>
</div>

<script>
function switchPage(name, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  var pg = document.getElementById('page-' + name);
  if(pg) pg.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>
</body>
</html>
