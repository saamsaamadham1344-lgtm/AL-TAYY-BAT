<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام الطيبات الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(circle at 50% -30%,#2a1e0a 0%,#0a0704 55%,#000 100%);color:#fff;min-height:100vh;padding-bottom:140px}
    .container{max-width:520px;margin:0 auto;padding:0 18px}
    .top-row{display:flex;justify-content:space-between;align-items:center;padding-top:22px}
    .circle-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2a1e0a,#14100a);border:1px solid rgba(212,162,74,.5);display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-center{font-size:50px;line-height:1;filter:drop-shadow(0 4px 12px rgba(212,162,74,.5))}
    .header{text-align:center;margin-top:10px}
    .header h1{font-size:38px;font-weight:900;letter-spacing:1px;background:linear-gradient(110deg,#b8862a,#f9e7a1 50%,#b8862a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header .sub{color:#d9c088;font-size:14px;margin-top:6px}
    .welcome{margin-top:14px;color:#f7e28b;font-size:14px;text-align:center}
    .page{display:none}
    .page.active{display:block}
    .cards{margin-top:30px;display:flex;flex-direction:column;gap:18px}
    .card{padding:22px;display:flex;align-items:center;gap:14px;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:18px}
    .gold-text{background:linear-gradient(135deg,#f9e7a1,#d4a24a 40%,#b8862a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card-body{flex:1;text-align:right}
    .card-body h2{font-size:28px;font-weight:900}
    .card-body p{color:#d9c088;font-size:14px;margin-top:8px;line-height:1.6}
    .gold-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;font-weight:800;padding:12px 26px;border:none;border-radius:999px;cursor:pointer;font-size:16px;margin-top:14px}
    .icon-visual{width:100px;height:100px;border-radius:24px;background:linear-gradient(135deg,#f9e7a1,#b8862a);display:flex;align-items:center;justify-content:center;font-size:48px}
    
    .books-top{text-align:center;margin-top:20px;margin-bottom:10px}
    .book-grid{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-bottom:30px}
    .book-card{cursor:pointer}
    .book-cover{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center;background-color:#1a1208;border-radius:14px 14px 0 0;overflow:hidden}
    .book-card-body{background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-top:none;border-radius:0 0 22px 22px;padding:12px;text-align:center}
    .book-card-body .t{color:#f7e28b;font-size:15px;font-weight:800}
    .book-card-body .d{color:#a69466;font-size:12px;margin-top:4px}
    .open-btn{background:linear-gradient(135deg,#f9e7a1,#d4a24a,#b8862a);color:#1a1208;padding:9px 18px;border-radius:999px;border:none;cursor:pointer;font-size:14px;font-weight:800;margin-top:10px;width:100%}
    
    #page-videos { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; display: none; }
    #page-videos.active { display: block; }
    .video-container { width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .video-back-btn { position: absolute; top: 20px; right: 20px; z-index: 1100; background: rgba(0,0,0,0.8); color: #fff; border: 2px solid #d4a24a; padding: 8px 16px; border-radius: 999px; font-weight: bold; cursor: pointer; }

    /* UZUN VİDEOLAR SAYFASI */
    .long-top{text-align:center;margin-top:20px;margin-bottom:10px}
    .long-video-list{display:flex;flex-direction:column;gap:16px;padding-bottom:30px;margin-top:10px}
    .long-video-card{background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .2s}
    .long-video-card:hover{transform:translateY(-3px)}
    .long-video-thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;background-color:#1a1208;position:relative;display:flex;align-items:center;justify-content:center}
    .play-overlay{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(212,162,74,.9);display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a1208;box-shadow:0 4px 20px rgba(0,0,0,.5)}
    .long-video-info{padding:14px}
    .long-video-title{color:#f7e28b;font-size:16px;font-weight:800;line-height:1.4}
    .long-video-desc{color:#a69466;font-size:13px;margin-top:6px;line-height:1.5}

    /* UZUN VİDEO OYNATICI */
    .video-player{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:9999;flex-direction:column}
    .video-player.active{display:flex}
    .vp-topbar{background:linear-gradient(135deg,rgba(26,18,8,.98),rgba(10,7,4,.98));border-bottom:1.5px solid rgba(212,162,74,.35);display:flex;align-items:center;padding:10px 14px;gap:12px}
    .vp-close{height:42px;width:42px;border-radius:12px;border:1.5px solid rgba(185,28,28,.5);background:linear-gradient(135deg,#b91c1c,#7f1d1d);color:#fff;font-size:18px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .vp-title{color:#f7e28b;font-size:17px;font-weight:800;flex:1;text-align:center}
    .vp-frame-wrap{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
    .vp-frame{width:100%;height:100%;border:none}

    .pdf-viewer{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0704;z-index:9999;flex-direction:column}
    .pdf-viewer.active{display:flex}
    .pdf-topbar{background:linear-gradient(135deg,rgba(26,18,8,.98),rgba(10,7,4,.98));border-bottom:1.5px solid rgba(212,162,74,.35);display:flex;align-items:center;padding:10px 14px;gap:12px}
    .tb-close{height:42px;width:42px;border-radius:12px;border:1.5px solid rgba(185,28,28,.5);background:linear-gradient(135deg,#b91c1c,#7f1d1d);color:#fff;font-size:18px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .pdf-title{color:#f7e28b;font-size:17px;font-weight:800;flex:1;text-align:center}
    .pdf-frame-wrap{flex:1;position:relative;overflow:hidden;background:#1a1a1a}
    .pdf-frame{width:100%;height:100%;border:none;background:#fff}
    .pdf-loading{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0704;z-index:2}
    .spinner{width:50px;height:50px;border:4px solid rgba(212,162,74,.2);border-top-color:#d4a24a;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none}

    .bottom-nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 18px 20px 18px;background:linear-gradient(to top,#000 70%,transparent)}
    .bottom-nav{max-width:560px;margin:0 auto;background:#0f0a04;border:1.5px solid rgba(212,162,74,.5);border-radius:999px;display:flex;overflow:hidden;padding:6px 0}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border:none;background:transparent;cursor:pointer}
    .nav-btn .ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;font-size:22px;color:#a69466}
    .nav-btn.active .ico{background:linear-gradient(135deg,#f9e7a1,#b8862a);color:#1a1208}
    .nav-btn .lbl{font-size:12px;font-weight:700;color:#a69466}
    .nav-btn.active .lbl{color:#f7e28b}
  </style>
</head>
<body>
  <div class="container" id="main-ui">
    <div class="top-row">
      <div class="circle-btn">&#128100;</div>
      <div class="logo-center">&#127806;</div>
      <div class="circle-btn">&#128276;</div>
    </div>
    <div class="header">
      <h1>نظام الطيبات الذكي</h1>
      <div class="sub">بناء نظام ذكي</div>
      <div class="welcome">أهلا وسهلا</div>
    </div>

    <!-- ANA SAYFA -->
    <main id="page-home" class="page active">
      <div class="cards">
        <section class="card">
          <div class="card-body">
            <h2 class="gold-text">الفيديوهات</h2>
            <p>شاهد أحدث الفيديوهات في مكان واحد</p>
            <button class="gold-btn" onclick="goTo('videos')">مشاهدة</button>
          </div>
          <div class="icon-visual">&#127916;</div>
        </section>

        <!-- YENİ: UZUN VİDEOLAR KARTI -->
        <section class="card">
          <div class="card-body">
            <h2 class="gold-text">الفيديوهات الطويلة</h2>
            <p>شاهد الفيديوهات الطويلة من يوتيوب</p>
            <button class="gold-btn" onclick="goTo('longvideos')">مشاهدة</button>
          </div>
          <div class="icon-visual">&#127909;</div>
        </section>

        <section class="card">
          <div class="card-body">
            <h2 class="gold-text">الكتب</h2>
            <p>اقرأ أفضل الكتب ومقاطع PDF</p>
            <button class="gold-btn" onclick="goTo('books')">استعراض</button>
          </div>
          <div class="icon-visual">&#128218;</div>
        </section>
      </div>
    </main>

    <!-- KİTAPLAR SAYFASI -->
    <main id="page-books" class="page">
      <div class="books-top"><button class="gold-btn" onclick="goTo('home')">الرئيسية</button></div>
      <div class="book-grid">
        <div class="book-card">
          <div class="book-cover" style="background-image:url('kapak1.jpg')"></div>
          <div class="book-card-body">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الأول - PDF</div>
            <button class="open-btn" onclick="openPDF('kitap1.pdf','كتاب الطيبات - الجزء الأول')">فتح الكتاب</button>
          </div>
        </div>
        <div class="book-card">
          <div class="book-cover" style="background-image:url('kapak2.jpg')"></div>
          <div class="book-card-body">
            <div class="t">كتاب الطيبات</div>
            <div class="d">الجزء الثاني - PDF</div>
            <button class="open-btn" onclick="openPDF('kitap2.pdf','كتاب الطيبات - الجزء الثاني')">فتح الكتاب</button>
          </div>
        </div>
      </div>
    </main>

    <!-- YENİ: UZUN VİDEOLAR SAYFASI -->
    <main id="page-longvideos" class="page">
      <div class="long-top"><button class="gold-btn" onclick="goTo('home')">الرئيسية</button></div>
      <div class="long-video-list" id="longVideoList">
        <!-- Videolar buraya JavaScript ile otomatik eklenir -->
      </div>
    </main>
  </div>

  <main id="page-videos" class="page">
    <button class="video-back-btn" onclick="goTo('home')">X خروج</button>
    <div id="video-list"></div>
  </main>

  <!-- YENİ: UZUN VİDEO OYNATICI -->
  <div class="video-player" id="videoPlayer">
    <div class="vp-topbar">
      <button class="vp-close" onclick="closeVideo()">X</button>
      <div class="vp-title" id="vpTitle">فيديو</div>
    </div>
    <div class="vp-frame-wrap">
      <iframe id="vpFrame" class="vp-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>

  <div class="pdf-viewer" id="pdfViewer">
    <div class="pdf-topbar">
      <button class="tb-close" onclick="closePDF()">X</button>
      <div class="pdf-title" id="pdfTitle">الكتاب</div>
    </div>
    <div class="pdf-frame-wrap">
      <iframe id="pdfFrame" class="pdf-frame"></iframe>
      <div class="pdf-loading hidden" id="pdfLoading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="goTo('books')"><div class="ico">&#128218;</div><span class="lbl">الكتب</span></button>
      <button class="nav-btn" onclick="goTo('longvideos')"><div class="ico">&#127909;</div><span class="lbl">طويلة</span></button>
      <button class="nav-btn" onclick="goTo('videos')"><div class="ico">&#127916;</div><span class="lbl">قصيرة</span></button>
      <button class="nav-btn active" id="btn-home" onclick="goTo('home')"><div class="ico">&#127968;</div><span class="lbl">الرئيسية</span></button>
    </nav>
  </div>

  <script>
    const SITE_URL = "https://saamsaamadham1344-lgtm.github.io/AL-TAYY-BAT/";

    // ============================================
    // 📺 UZUN VİDEOLAR LİSTESİ
    // Yeni video eklemek için aşağıya yeni satır ekleyin
    // YouTube linkindeki video ID'sini (v= sonrası) kopyalayın
    // ============================================
    const longVideos = [
      {
        id: "dQw4w9WgXcQ",  // YouTube video ID
        title: "اسم الفيديو الأول",
        description: "وصف قصير للفيديو"
      },
      {
        id: "9bZkp7q19f0",
        title: "اسم الفيديو الثاني",
        description: "وصف قصير للفيديو"
      },
      {
        id: "kJQP7kiw5Fk",
        title: "اسم الفيديو الثالث",
        description: "وصف قصير للفيديو"
      }
    ];

    // UZUN VİDEOLARI EKRANA YAZDIR
    function loadLongVideos() {
      const list = document.getElementById('longVideoList');
      list.innerHTML = '';
      longVideos.forEach(v => {
        const card = document.createElement('div');
        card.className = 'long-video-card';
        card.onclick = () => playVideo(v.id, v.title);
        card.innerHTML = `
          <div class="long-video-thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/hqdefault.jpg')">
            <div class="play-overlay">▶</div>
          </div>
          <div class="long-video-info">
            <div class="long-video-title">${v.title}</div>
            <div class="long-video-desc">${v.description}</div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // VİDEO OYNAT
    function playVideo(videoId, title) {
      document.getElementById('vpTitle').innerText = title;
      document.getElementById('vpFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      document.getElementById('videoPlayer').classList.add('active');
    }

    // VİDEO KAPAT
    function closeVideo() {
      document.getElementById('videoPlayer').classList.remove('active');
      document.getElementById('vpFrame').src = '';
    }

    // SAYFA GEÇİŞ FONKSİYONU
    function goTo(pageName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const target = document.getElementById('page-' + pageName);
      if (target) target.classList.add('active');

      const mainUI = document.getElementById('main-ui');
      if (pageName === 'videos') {
        mainUI.style.display = 'none';
      } else {
        mainUI.style.display = 'block';
      }

      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (pageName === 'home') {
        document.getElementById('btn-home').classList.add('active');
      }

      // Uzun videolar sayfasına geçince listeyi yükle
      if (pageName === 'longvideos') {
        loadLongVideos();
      }
    }

    // PDF AÇMA (GOOGLE DOCS VIEWER İLE)
    function openPDF(file, title) {
      const fullPDFUrl = SITE_URL + file;
      const googleViewer = "https://docs.google.com/viewer?url=" + encodeURIComponent(fullPDFUrl) + "&embedded=true";
      
      document.getElementById('pdfTitle').innerText = title;
      document.getElementById('pdfLoading').classList.remove('hidden');
      
      const frame = document.getElementById('pdfFrame');
      frame.src = googleViewer;
      
      frame.onload = function() {
        setTimeout(() => {
          document.getElementById('pdfLoading').classList.add('hidden');
        }, 1500);
      };
      
      document.getElementById('pdfViewer').classList.add('active');
    }

    function closePDF() {
      document.getElementById('pdfViewer').classList.remove('active');
      document.getElementById('pdfFrame').src = '';
    }
  </script>

</body>
</html>
